<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coreGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3a735;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9800;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="300" y="30" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">
    Multi-Core CPU Parallel Processing
  </text>
  
  <!-- CPU Box -->
  <rect x="50" y="60" width="500" height="200" fill="url(#cpuGrad)" rx="10" opacity="0.2" stroke="#ff9800" stroke-width="2"/>
  
  <text x="300" y="85" font-size="14" font-weight="bold" text-anchor="middle" fill="#ff9800">
    4-Core Processor
  </text>
  
  <!-- Core 1 -->
  <rect x="80" y="110" width="90" height="130" fill="url(#coreGrad1)" rx="5"/>
  <text x="125" y="135" font-size="11" text-anchor="middle" fill="white" font-weight="bold">
    Core 1
  </text>
  <text x="125" y="155" font-size="10" text-anchor="middle" fill="white">
    Task A
  </text>
  <text x="125" y="170" font-size="10" text-anchor="middle" fill="white">
    Running...
  </text>
  <circle cx="125" cy="190" r="6" fill="#fff" opacity="0.8"/>
  
  <!-- Core 2 -->
  <rect x="185" y="110" width="90" height="130" fill="url(#coreGrad1)" rx="5"/>
  <text x="230" y="135" font-size="11" text-anchor="middle" fill="white" font-weight="bold">
    Core 2
  </text>
  <text x="230" y="155" font-size="10" text-anchor="middle" fill="white">
    Task B
  </text>
  <text x="230" y="170" font-size="10" text-anchor="middle" fill="white">
    Running...
  </text>
  <circle cx="230" cy="190" r="6" fill="#fff" opacity="0.8"/>
  
  <!-- Core 3 -->
  <rect x="290" y="110" width="90" height="130" fill="url(#coreGrad1)" rx="5"/>
  <text x="335" y="135" font-size="11" text-anchor="middle" fill="white" font-weight="bold">
    Core 3
  </text>
  <text x="335" y="155" font-size="10" text-anchor="middle" fill="white">
    Task C
  </text>
  <text x="335" y="170" font-size="10" text-anchor="middle" fill="white">
    Running...
  </text>
  <circle cx="335" cy="190" r="6" fill="#fff" opacity="0.8"/>
  
  <!-- Core 4 -->
  <rect x="395" y="110" width="90" height="130" fill="url(#coreGrad2)" rx="5"/>
  <text x="440" y="135" font-size="11" text-anchor="middle" fill="white" font-weight="bold">
    Core 4
  </text>
  <text x="440" y="155" font-size="10" text-anchor="middle" fill="white">
    Task D
  </text>
  <text x="440" y="170" font-size="10" text-anchor="middle" fill="white">
    Running...
  </text>
  <circle cx="440" cy="190" r="6" fill="#fff" opacity="0.8"/>
  
  <!-- Information Box -->
  <rect x="50" y="280" width="500" height="50" fill="#f0f0f0" rx="5" stroke="#ddd" stroke-width="1"/>
  
  <text x="60" y="300" font-size="12" fill="#333">
    ✓ Each core executes instructions independently
  </text>
  
  <text x="60" y="320" font-size="12" fill="#333">
    ✓ 4 tasks can truly run in parallel on 4 cores
  </text>
</svg>
