<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5252;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="300" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    Sequential vs Parallel Processing
  </text>
  
  <!-- Sequential section -->
  <text x="50" y="70" font-size="14" font-weight="bold" fill="#ff6b6b">
    Sequential (120 minutes)
  </text>
  
  <rect x="30" y="85" width="140" height="50" fill="url(#grad1)" rx="5"/>
  <text x="100" y="115" font-size="12" text-anchor="middle" fill="white" font-weight="bold">
    Task 1 (30min)
  </text>
  
  <rect x="30" y="145" width="140" height="50" fill="url(#grad1)" rx="5"/>
  <text x="100" y="175" font-size="12" text-anchor="middle" fill="white" font-weight="bold">
    Task 2 (30min)
  </text>
  
  <rect x="30" y="205" width="140" height="50" fill="url(#grad1)" rx="5"/>
  <text x="100" y="235" font-size="12" text-anchor="middle" fill="white" font-weight="bold">
    Task 3 (30min)
  </text>
  
  <rect x="30" y="265" width="140" height="50" fill="url(#grad1)" rx="5"/>
  <text x="100" y="295" font-size="12" text-anchor="middle" fill="white" font-weight="bold">
    Task 4 (30min)
  </text>
  
  <!-- Arrow -->
  <text x="200" y="200" font-size="30" fill="#666">→</text>
  
  <!-- Parallel section -->
  <text x="420" y="70" font-size="14" font-weight="bold" fill="#51cf66">
    Parallel (30 minutes)
  </text>
  
  <rect x="320" y="85" width="140" height="50" fill="url(#grad2)" rx="5"/>
  <text x="390" y="115" font-size="12" text-anchor="middle" fill="white" font-weight="bold">
    Task 1 (30min)
  </text>
  
  <rect x="320" y="145" width="140" height="50" fill="url(#grad2)" rx="5"/>
  <text x="390" y="175" font-size="12" text-anchor="middle" fill="white" font-weight="bold">
    Task 2 (30min)
  </text>
  
  <rect x="320" y="205" width="140" height="50" fill="url(#grad2)" rx="5"/>
  <text x="390" y="235" font-size="12" text-anchor="middle" fill="white" font-weight="bold">
    Task 3 (30min)
  </text>
  
  <rect x="320" y="265" width="140" height="50" fill="url(#grad2)" rx="5"/>
  <text x="390" y="295" font-size="12" text-anchor="middle" fill="white" font-weight="bold">
    Task 4 (30min)
  </text>
</svg>
