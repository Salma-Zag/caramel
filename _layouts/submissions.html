---
title: Submissions
layout: aesthetihawk
active_tab: submissions
---

<div class="w-full">
    <div class="space-y-4 sm:space-y-6">
        <div class="text-sm font-medium text-center border-b text-neutral-400 border-neutral-700 relative">
            <ul class="flex flex-wrap -mb-px relative" id="tab-bar">
                <li class="me-2">
                    <button id="tab-my-submissions" class="tab-btn active inline-block p-4 border-b-2 border-blue-500 text-blue-500 rounded-t-lg">
                        My Submissions
                    </button>
                </li>
                <li class="me-2">
                    <button id="tab-all-submissions" class="tab-btn inline-block p-4 border-b-2 border-transparent rounded-t-lg text-neutral-400 hover:text-neutral-300" style="display: none;">
                        All Submissions
                    </button>
                </li>
            </ul>
            <!-- sliding underline indicator -->
            <div id="tab-underline"
                style="position:absolute;bottom:0;left:0;height:2px;width:0;background:#2563eb;transition:all 0.3s cubic-bezier(.4,0,.2,1);border-radius:2px;">
            </div>
        </div>

        <!-- tab content container -->
        <div id="tab-content-container" class="relative min-h-[400px]">

            <!-- My Submissions tab content -->
            <div id="tab-content-my-submissions" class="tab-content block px-6 py-4 text-neutral-200">
                <div id="my-submissions-loading" class="flex items-center justify-center min-h-[400px]">
                    <div class="text-center">
                        <div class="inline-block">
                            <svg class="h-8 w-8 animate-spin text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                        <p class="text-neutral-400 mt-4">Loading submissions...</p>
                    </div>
                </div>
                <div id="my-submissions-container"></div>
            </div>

            <!-- All Submissions tab content (Admin only) -->
            <div id="tab-content-all-submissions" class="tab-content hidden px-6 py-4 text-neutral-200">
                <div class="mb-6 flex gap-3 flex-wrap">
                    <input type="text" id="admin-filter-assignment" class="px-4 py-2 rounded-lg border border-neutral-600 bg-neutral-700 text-neutral-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Filter by assignment...">
                    <input type="text" id="admin-filter-student" class="px-4 py-2 rounded-lg border border-neutral-600 bg-neutral-700 text-neutral-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Filter by student...">
                    <select id="admin-filter-status" class="px-4 py-2 rounded-lg border border-neutral-600 bg-neutral-700 text-neutral-50 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">All Statuses</option>
                        <option value="pending">Pending Review</option>
                        <option value="graded">Graded</option>
                        <option value="late">Late</option>
                    </select>
                </div>
                <div id="all-submissions-loading" class="flex items-center justify-center min-h-[400px]">
                    <div class="text-center">
                        <div class="inline-block">
                            <svg class="h-8 w-8 animate-spin text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                        <p class="text-neutral-400 mt-4">Loading submissions...</p>
                    </div>
                </div>
                <div id="all-submissions-container"></div>
            </div>

        </div>
    </div>
</div>

<div id="submission-edit-modal" class="edit-modal hidden" aria-hidden="true">
    <div class="edit-modal-backdrop" data-close-edit-modal></div>
    <div class="edit-modal-panel" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
        <div class="edit-modal-header">
            <div>
                <p class="edit-modal-kicker">Edit submission</p>
                <h3 id="edit-modal-title">Update your submission</h3>
                <p id="edit-modal-subtitle" class="edit-modal-subtitle"></p>
            </div>
            <button type="button" class="edit-modal-close" data-close-edit-modal aria-label="Close edit dialog">&times;</button>
        </div>

        <form id="submission-edit-form">
            <input type="hidden" id="edit-submission-id">
            <input type="hidden" id="edit-content-type">

            <div class="edit-modal-grid">
                <div class="edit-readonly-field">
                    <span class="edit-field-label">Assignment</span>
                    <div id="edit-assignment-name" class="edit-field-value"></div>
                </div>
                <div class="edit-readonly-field">
                    <span class="edit-field-label">Submission type</span>
                    <div id="edit-submission-type" class="edit-field-value"></div>
                </div>
                <label class="edit-checkbox-row">
                    <input type="checkbox" id="edit-is-late">
                    <span>Mark as late</span>
                </label>
            </div>

            <div id="edit-link-fields" class="edit-section">
                <label class="edit-field-label" for="edit-url">Submission URL</label>
                <input type="url" id="edit-url" class="edit-input" placeholder="https://...">
            </div>

            <div id="edit-file-fields" class="edit-section hidden">
                <div class="edit-current-file" id="edit-current-file"></div>
                <label class="edit-field-label" for="edit-file">Replace file</label>
                <input type="file" id="edit-file" class="edit-input">
            </div>

            <div class="edit-section">
                <label class="edit-field-label" for="edit-notes">Submission notes</label>
                <textarea id="edit-notes" class="edit-textarea" rows="4" placeholder="Add or update the notes shown with the submission"></textarea>
            </div>

            <div class="edit-section">
                <label class="edit-field-label" for="edit-comment">Comment</label>
                <textarea id="edit-comment" class="edit-textarea" rows="4" placeholder="Add or update the submission comment"></textarea>
            </div>

            <div id="edit-modal-status" class="edit-modal-status" aria-live="polite"></div>

            <div class="edit-modal-actions">
                <button type="button" class="edit-secondary-btn" data-close-edit-modal>Cancel</button>
                <button type="submit" class="edit-primary-btn">Save changes</button>
            </div>
            <p class="edit-modal-note">Saving clears the current grade and feedback so the updated submission can be reviewed again.</p>
        </form>
    </div>
</div>

<script type="module">
    import { javaURI, fetchOptions } from '{{ site.baseurl }}/assets/js/api/config.js';

    const apiUrl = `${javaURI}/api/assignment-submission-view/list`;
    const userInfoUrl = `${javaURI}/api/assignment-submission-view/user-info`;

    let allSubmissions = [];
    let isAdmin = false;
    let currentUserId = null;
    let currentUsername = '';
    let activeEditSubmissionId = null;
    let synergyGradeMap = {}; // assignmentId (string) → grade (number) for current user

    async function init() {
        try {
            await checkAdminStatus();
            await loadSubmissions();
            setupTabSwitcher();
            setupFilters();
            setupEditModal();
            hideLoadingSpinners();
        } catch (error) {
            console.error('Error initializing submissions:', error);
            showErrorMessage('Failed to initialize submissions dashboard');
        }
    }

    async function checkAdminStatus() {
        try {
            console.log('Checking admin status from:', userInfoUrl);
            const response = await fetch(userInfoUrl, fetchOptions);

            if (response.ok) {
                const userInfo = await response.json();
                isAdmin = userInfo.isAdmin;
                currentUsername = userInfo.username || '';
                console.log('User is admin:', isAdmin);

                if (currentUsername) {
                    try {
                        const personResponse = await fetch(`${javaURI}/api/person/uid/${encodeURIComponent(currentUsername)}`, fetchOptions);
                        if (personResponse.ok) {
                            const person = await personResponse.json();
                            currentUserId = person.id;
                        } else {
                            console.warn('Could not resolve current user id, status:', personResponse.status);
                        }
                    } catch (personError) {
                        console.error('Error resolving current user id:', personError);
                    }
                }

                // Show admin tab only for admins
                if (isAdmin) {
                    document.getElementById('tab-all-submissions').style.display = 'block';
                }
            } else {
                console.warn('Could not fetch user info, status:', response.status);
            }
        } catch (error) {
            console.error('Error checking admin status:', error);
            // Continue anyway - just won't show admin tab
        }
    }

    async function loadSubmissions() {
        try {
            console.log('Fetching submissions from:', apiUrl);
            const response = await fetch(apiUrl, fetchOptions);

            console.log('Response status:', response.status, 'ok:', response.ok);

            if (!response.ok) {
                console.error(`HTTP error! status: ${response.status}`);

                // Try to parse error message from response
                let errorMsg = `HTTP ${response.status}`;
                try {
                    const errorData = await response.json();
                    if (errorData.error) {
                        errorMsg = errorData.error;
                        console.error('Server error message:', errorMsg);
                    }
                } catch (parseError) {
                    console.warn('Could not parse error response');
                }

                throw new Error(`Failed to fetch submissions: ${errorMsg}`);
            }

            // Parse response as JSON
            let data;
            try {
                data = await response.json();
                console.log('Successfully parsed response, submissions count:', data.length);
            } catch (parseError) {
                console.error('Failed to parse JSON response:', parseError);
                throw new Error('Invalid response format from server');
            }

            // Handle both array and null responses
            allSubmissions = Array.isArray(data) ? data : [];
            console.log('Set allSubmissions to', allSubmissions.length, 'items');

            // Fetch synergy grades for the current user so "My Submissions" shows real grades
            if (currentUserId) {
                try {
                    const gradeResp = await fetch(`${javaURI}/api/synergy/grades/map/${currentUserId}`, fetchOptions);
                    if (gradeResp.ok) {
                        synergyGradeMap = await gradeResp.json(); // { "assignmentId": grade, ... }
                    }
                } catch (e) {
                    console.warn('Could not fetch synergy grades:', e);
                }
            }

            displayUserSubmissions();
            if (isAdmin) {
                displayAllSubmissions();
            }

        } catch (error) {
            console.error('Error in loadSubmissions:', error);
            console.error('Error type:', error.constructor.name);
            console.error('Error message:', error.message);
            console.error('Full error:', error);

            showErrorMessage(`Error loading submissions: ${error.message}`);
        }
    }

    function renderContent(content) {
        if (!content) return '<em style="color:#6b7280">No content</em>';
        if (typeof content === 'string') return escapeHtml(content);
        if (content.type === 'file' || content.filename) {
            const fileName = content.filename || content.storedFilename || 'File submission';
            const notes = content.notes ? `<div style="color:#9ca3af;margin-top:6px;">${escapeHtml(content.notes)}</div>` : '';
            const extra = content.contentType ? `<div style="color:#6b7280;margin-top:4px;">${escapeHtml(content.contentType)} · ${escapeHtml(String(content.size || ''))}</div>` : '';
            return `<div><strong>${escapeHtml(fileName)}</strong>${extra}${notes}</div>`;
        }
        if (content.type === 'link' || content.url) return `<a href="${escapeHtml(content.url)}" target="_blank" rel="noopener" style="color:#60a5fa;text-decoration:underline;">${escapeHtml(content.url)}</a>`;
        if (content.text) return escapeHtml(content.text);
        return escapeHtml(JSON.stringify(content));
    }

    function getSubmissionContentType(submission) {
        const content = submission.content || {};
        const type = (content.type || (content.filename ? 'file' : 'link') || '').toString().toLowerCase();
        return type === 'file' ? 'file' : 'link';
    }

    function getSubmissionById(submissionId) {
        return allSubmissions.find(submission => String(submission.id) === String(submissionId));
    }

    function setEditModalStatus(message, type = 'info') {
        const status = document.getElementById('edit-modal-status');
        if (!status) return;
        status.textContent = message || '';
        status.style.color = type === 'error' ? 'rgb(248, 113, 113)' : type === 'success' ? 'rgb(134, 239, 172)' : 'rgb(252, 211, 77)';
    }

    function toggleEditSections(contentType) {
        const linkFields = document.getElementById('edit-link-fields');
        const fileFields = document.getElementById('edit-file-fields');
        if (!linkFields || !fileFields) return;

        if (contentType === 'file') {
            linkFields.classList.add('hidden');
            fileFields.classList.remove('hidden');
        } else {
            fileFields.classList.add('hidden');
            linkFields.classList.remove('hidden');
        }
    }

    function closeEditModal() {
        const modal = document.getElementById('submission-edit-modal');
        const form = document.getElementById('submission-edit-form');
        if (modal) {
            modal.classList.add('hidden');
            modal.setAttribute('aria-hidden', 'true');
        }
        if (form) form.reset();
        activeEditSubmissionId = null;
        setEditModalStatus('');
    }

    function openEditModal(submissionId) {
        const submission = getSubmissionById(submissionId);
        if (!submission) {
            showErrorMessage('Could not find that submission to edit.');
            return;
        }

        const modal = document.getElementById('submission-edit-modal');
        const form = document.getElementById('submission-edit-form');
        const assignmentName = document.getElementById('edit-assignment-name');
        const submissionType = document.getElementById('edit-submission-type');
        const subtitle = document.getElementById('edit-modal-subtitle');
        const submissionIdInput = document.getElementById('edit-submission-id');
        const contentTypeInput = document.getElementById('edit-content-type');
        const urlInput = document.getElementById('edit-url');
        const notesInput = document.getElementById('edit-notes');
        const commentInput = document.getElementById('edit-comment');
        const fileInput = document.getElementById('edit-file');
        const currentFile = document.getElementById('edit-current-file');
        const isLateInput = document.getElementById('edit-is-late');

        const contentType = getSubmissionContentType(submission);
        const content = submission.content || {};

        activeEditSubmissionId = submission.id;
        submissionIdInput.value = submission.id;
        contentTypeInput.value = contentType;
        assignmentName.textContent = submission.assignmentName || 'Unknown assignment';
        submissionType.textContent = contentType === 'file' ? 'File upload' : 'Link submission';
        subtitle.textContent = `Editing submission #${submission.id}`;
        isLateInput.checked = Boolean(submission.isLate);

        urlInput.value = content.url || '';
        notesInput.value = content.notes || submission.comment || '';
        commentInput.value = submission.comment || content.notes || '';
        if (fileInput) fileInput.value = '';
        currentFile.textContent = content.filename
            ? `Current file: ${content.filename}`
            : 'No file attached yet.';

        toggleEditSections(contentType);
        setEditModalStatus('');

        if (modal) {
            modal.classList.remove('hidden');
            modal.setAttribute('aria-hidden', 'false');
        }

        if (form) {
            const focusTarget = contentType === 'file' ? fileInput : urlInput;
            setTimeout(() => focusTarget?.focus(), 0);
        }
    }

    window.openEditModal = openEditModal;
    window.closeEditModal = closeEditModal;

    async function saveSubmissionEdit(event) {
        event.preventDefault();

        if (!activeEditSubmissionId) {
            return;
        }

        const submission = getSubmissionById(activeEditSubmissionId);
        if (!submission) {
            setEditModalStatus('The submission could not be found.', 'error');
            return;
        }

        const contentType = document.getElementById('edit-content-type').value;
        const url = document.getElementById('edit-url').value.trim();
        const notes = document.getElementById('edit-notes').value.trim();
        const comment = document.getElementById('edit-comment').value.trim();
        const isLate = document.getElementById('edit-is-late').checked;
        const fileInput = document.getElementById('edit-file');
        const submitButton = document.querySelector('#submission-edit-form .edit-primary-btn');

        const formData = new FormData();
        formData.append('contentType', contentType);
        formData.append('notes', notes);
        formData.append('comment', comment);
        formData.append('isLate', isLate ? 'true' : 'false');

        if (contentType === 'link') {
            if (!url) {
                setEditModalStatus('A URL is required for link submissions.', 'error');
                return;
            }
            formData.append('url', url);
        } else if (fileInput?.files?.length) {
            formData.append('file', fileInput.files[0]);
        }

        try {
            submitButton.disabled = true;
            setEditModalStatus('Saving changes...');

            const response = await fetch(`${javaURI}/api/submissions/${encodeURIComponent(activeEditSubmissionId)}`, {
                method: 'PUT',
                mode: 'cors',
                credentials: 'include',
                headers: {
                    'X-Origin': 'client'
                },
                body: formData
            });

            if (!response.ok) {
                let message = `HTTP ${response.status}`;
                try {
                    const errorData = await response.json();
                    if (errorData.error) message = errorData.error;
                } catch (parseError) {
                    console.warn('Could not parse edit error response');
                }
                throw new Error(message);
            }

            setEditModalStatus('Submission updated successfully.', 'success');
            await loadSubmissions();
            closeEditModal();
        } catch (error) {
            console.error('Error updating submission:', error);
            setEditModalStatus(error.message, 'error');
        } finally {
            submitButton.disabled = false;
        }
    }

    window.saveGrade = async function(idx, assignmentId, studentId) {
        const input = document.getElementById(`grade-input-${idx}`);
        const status = document.getElementById(`grade-status-${idx}`);
        const gradeValue = parseFloat(input.value);

        if (isNaN(gradeValue) || gradeValue < 0 || gradeValue > 100) {
            status.textContent = '⚠ Enter 0–100';
            status.style.color = '#f59e0b';
            return;
        }
        if (assignmentId == null || studentId == null) {
            status.textContent = '⚠ Missing IDs';
            status.style.color = '#f59e0b';
            return;
        }

        status.textContent = 'Saving…';
        status.style.color = '#9ca3af';

        try {
            const resp = await fetch(`${javaURI}/api/synergy/grade`, {
                ...fetchOptions,
                method: 'POST',
                body: JSON.stringify({
                    grade: gradeValue,
                    assignment: { id: assignmentId },
                    student: { id: studentId }
                })
            });

            if (resp.ok) {
                status.textContent = '✓ Saved';
                status.style.color = '#34d399';
                input.style.borderColor = '#34d399';
                // Update the submission in allSubmissions so status badge refreshes on next filter
                const sub = allSubmissions.find(s => s.assignmentId === assignmentId && s.submitterId === studentId);
                if (sub) sub.grade = gradeValue;
            } else {
                const err = await resp.json().catch(() => ({}));
                status.textContent = `✗ ${err.message || resp.status}`;
                status.style.color = '#f87171';
            }
        } catch (e) {
            status.textContent = '✗ Network error';
            status.style.color = '#f87171';
        }
    };

    // synergyGrade (optional) — if provided, takes precedence over submission.grade for the Graded check
    function getStatusBadge(submission, synergyGrade) {
        const isGraded = synergyGrade != null || (submission.grade !== null && submission.grade !== undefined);
        if (isGraded) {
            return '<span class="status-badge status-graded">Graded</span>';
        } else if (submission.isLate) {
            return '<span class="status-badge status-late">Late</span>';
        } else {
            return '<span class="status-badge status-pending">Pending Review</span>';
        }
    }

    function showErrorMessage(message) {
        const myContainer = document.getElementById('my-submissions-container');
        const allContainer = document.getElementById('all-submissions-container');
        const errorHTML = `<div class="error-message">${escapeHtml(message)}</div>`;

        if (myContainer) myContainer.innerHTML = errorHTML;
        if (allContainer) allContainer.innerHTML = errorHTML;
    }

    function setupTabSwitcher() {
        const tabs = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        const underline = document.getElementById('tab-underline');

        function setUnderline(el) {
            const rect = el.getBoundingClientRect();
            const parentRect = el.parentElement.parentElement.getBoundingClientRect();
            underline.style.width = `${rect.width}px`;
            underline.style.left = `${rect.left - parentRect.left}px`;
        }

        tabs.forEach((tab) => {
            tab.addEventListener('click', (e) => {
                e.preventDefault();
                tabs.forEach(t => t.classList.remove('active', 'text-blue-500', 'border-blue-500'));
                tabContents.forEach(c => c.classList.add('hidden'));
                tabContents.forEach(c => c.classList.remove('block'));

                const targetId = `tab-content-${tab.id.replace('tab-', '')}`;
                document.getElementById(targetId).classList.remove('hidden');
                document.getElementById(targetId).classList.add('block');

                tab.classList.add('active', 'text-blue-500', 'border-blue-500');
                setUnderline(tab);
            });
        });

        // Initialize underline
        const activeTab = document.querySelector('.tab-btn.active');
        if (activeTab) setUnderline(activeTab);
    }

    function setupFilters() {
        const filterAssignment = document.getElementById('admin-filter-assignment');
        const filterStudent = document.getElementById('admin-filter-student');
        const filterStatus = document.getElementById('admin-filter-status');

        [filterAssignment, filterStudent, filterStatus].forEach(filter => {
            if (filter) {
                filter.addEventListener('input', applyFilters);
            }
        });
    }

    function applyFilters() {
        const assignmentFilter = (document.getElementById('admin-filter-assignment').value || '').toLowerCase();
        const studentFilter = (document.getElementById('admin-filter-student').value || '').toLowerCase();
        const statusFilter = document.getElementById('admin-filter-status').value;

        const filtered = allSubmissions.filter(sub => {
            const assignmentMatch = (sub.assignmentName || '').toLowerCase().includes(assignmentFilter);
            const studentMatch = (sub.submitterName || '').toLowerCase().includes(studentFilter);
            const statusMatch = !statusFilter || getFilterStatus(sub) === statusFilter;

            return assignmentMatch && studentMatch && statusMatch;
        });

        if (filtered.length === 0) {
            document.getElementById('all-submissions-container').innerHTML =
                '<div class="no-submissions">No submissions match the filters.</div>';
            return;
        }

        const tableHTML = `
            <table class="submissions-table">
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Assignment</th>
                        <th>Submission</th>
                        <th>Status</th>
                        <th>Grade</th>
                        <th>Comment</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    ${filtered.map((submission, idx) => {
                        const gradeVal = submission.grade != null ? submission.grade : '';
                        const fIdx = `f${idx}`;
                        return `
                        <tr>
                            <td><strong>${escapeHtml(submission.submitterName || 'Unknown')}</strong></td>
                            <td>${escapeHtml(submission.assignmentName || 'Unknown')}</td>
                            <td>${renderContent(submission.content)}</td>
                            <td>${getStatusBadge(submission)}</td>
                            <td>
                                <div style="display:flex;align-items:center;gap:6px;">
                                    <input type="number" min="0" max="100" step="0.5"
                                        value="${escapeHtml(String(gradeVal))}"
                                        id="grade-input-${fIdx}"
                                        style="width:70px;padding:4px 6px;border-radius:4px;border:1px solid #4b5563;background:#1f2937;color:#f9fafb;font-size:0.85rem;"
                                        placeholder="0–100">
                                    <button
                                        onclick="saveGrade('${fIdx}', ${submission.assignmentId ?? 'null'}, ${submission.submitterId ?? 'null'})"
                                        style="padding:4px 10px;border-radius:4px;background:#2563eb;color:#fff;font-size:0.8rem;border:none;cursor:pointer;"
                                    >Save</button>
                                    <span id="grade-status-${fIdx}" style="font-size:0.75rem;color:#6b7280;"></span>
                                </div>
                            </td>
                            <td>${submission.comment ? escapeHtml(submission.comment) : '<em style="color:#6b7280">No comment</em>'}</td>
                            <td>
                                <div class="submission-actions">
                                    <button type="button" class="submission-action-btn" onclick="openEditModal(${submission.id})">Edit</button>
                                </div>
                            </td>
                        </tr>
                        `;
                    }).join('')}
                </tbody>
            </table>
        `;

        document.getElementById('all-submissions-container').innerHTML = tableHTML;
    }

    function getFilterStatus(submission) {
        if (submission.grade !== null && submission.grade !== undefined) {
            return 'graded';
        } else if (submission.isLate) {
            return 'late';
        } else {
            return 'pending';
        }
    }

    function hideLoadingSpinners() {
        const myLoading = document.getElementById('my-submissions-loading');
        const allLoading = document.getElementById('all-submissions-loading');

        if (myLoading) myLoading.style.display = 'none';
        if (allLoading) allLoading.style.display = 'none';
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function setupEditModal() {
        const modal = document.getElementById('submission-edit-modal');
        const form = document.getElementById('submission-edit-form');

        if (form) {
            form.addEventListener('submit', saveSubmissionEdit);
        }

        if (modal) {
            modal.querySelectorAll('[data-close-edit-modal]').forEach(button => {
                button.addEventListener('click', closeEditModal);
            });

            modal.addEventListener('keydown', (event) => {
                if (event.key === 'Escape' && !modal.classList.contains('hidden')) {
                    closeEditModal();
                }
            });
        }
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', init);
</script>
