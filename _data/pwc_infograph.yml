# Poway Woman's Club Capstone Infographic
Title: "Poway Woman's Club — Website Refurbishment"
Description: "We're a group of passionate students making the Poway Woman's Club website more personalized and usable — messaging to foster community, groups and events to surface what matters to each member, and profiles to make the experience your own."

Status: "In Development"

Team:
  - name: "Evan S"
    role: "Full-Stack / Backend"
    bio: "Built the interactive front-page game, groups system, admin panel backend APIs, and blogging system, plus other backend and management contributions."
  - name: "Maya D"
    role: "Deployment / Frontend"
    bio: "Deployed the site and built the friends and login system, messaging system, and user interaction flows."
  - name: "Cyrus Z"
    role: "Frontend / Integrations"
    bio: "Built the events system and calendar, Google-based login APIs, customizable profile elements, and an ML system that helps users connect."

About:
  who: "Three students partnering with the Poway Woman's Club — a 501(c)(3) nonprofit founded in 1960."
  what: "Rebuilding the club's website with member portals, an event calendar, live messaging, and an admin dashboard."
  why: "Six decades of scholarships, art exhibits, and youth programs deserve a site that's as welcoming as the club itself."

