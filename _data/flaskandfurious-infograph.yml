Title: "Safe Passage Heals"
Description: "A system of interactive web tools for Safe Passage Heals — centralizing community events through dynamic media management and an interactive simulation of the domestic violence recovery process."
Topics:
  - title: "Safe Passage Heals - Media Management Tools and Interactive Recovery Simulation"
    image: "capstone/sph.png"
    link: "https://ruchikak19.github.io/flaskandfurious"
    alt: "Safe Passage Heals - Media Management Tools and Interactive Recovery Simulation"
    keyPoints:
      - text: "Interactive <strong>event calendar</strong> shows all upcoming Safe Passage Heals events in a calendar view, with important event details displayed"
        url: "https://ruchikak19.github.io/flaskandfurious/sph/eventcalendar1/"
      - text: "<strong>Login system</strong> allows admins to access an event management dashboard"
        url: "https://ruchikak19.github.io/flaskandfurious/login"
      - text: "<strong>Admin dashboard</strong> allows for simple and centralized event management - add, edit, and delete events with ease!"
        url: "https://ruchikak19.github.io/flaskandfurious/sph/eventmgmt/"
      - text: "Admins can also add new events through an <strong>interactive form</strong>, which automatically updates the calendar and blog once the new event information is submitted"
        url: "https://ruchikak19.github.io/flaskandfurious/blog/post/"
      - text: "<strong>Path to Recovery</strong> is an interactive simulation where users travel through a virtual neighborhood and learn about the process of responding to domestic violence."
        url: "https://ruchikak19.github.io/flaskandfurious/recovery/"
      - text: "User interacts with various characters (eg. trusted adults, therapist, counselor, domestic violence hotline) in the simulation which walk the user through the process, step by step"
      - text: "The user also can take short diagnostic quizzes along the path for personalized suggestions, and they can talk to a confidential AI assistant for questions"

    description: "A two-part web platform built for Safe Passage Heals. The Dynamic Event Calendar centralizes all upcoming workshops, support groups, and community events in an interactive monthly view — with a secure admin dashboard for staff to add, edit, and delete events in real time. Path to Recovery is an interactive neighborhood simulation where users learn the domestic violence response process step by step, meet characters like counselors and hotline advocates, take personalized diagnostic quizzes, and consult a confidential AI assistant."
    impact:
    - "Eliminates scattered event information by centralizing all Safe Passage Heals events into one calendar with instant detail access and registration"
    - "A secure admin dashboard makes event management effortless — add, edit, and delete events from one centralized place in just a few clicks"
    - "Turns passive awareness into active learning through an interactive simulation that personalizes the recovery journey for each user"
    - "Makes education on domestic violence response accessible and engaging through a confidential AI assistant, diagnostic quizzes, and character-driven interactive storytelling"    
    status: "Working Prototype"
    team:
      - "Ruchika Kench"
      - "Akshara Shankar"
      - "Avantika Chittari"

