name: Create assignments from frontmatter

on:
  push:
    branches:
      - main
      - master

jobs:
  create-assignments:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests
      - name: Run create assignments script
        env:
          BASE_URL: https://spring.opencodingsociety.com
          PAGES_BOT_UID: toby
          PAGES_BOT_PASSWORD: ${{ secrets.PAGES_BOT_PASSWORD }}
        run: |
          python3 scripts/create_assignments_from_frontmatter.py --root . --base-url "$BASE_URL" --uid "$PAGES_BOT_UID" --password "$PAGES_BOT_PASSWORD"
